project_id = "iupprzfmlyfrdcctdupn"

[auth]
enabled = true
site_url = "https://web-sepia-one-88.vercel.app"
additional_redirect_urls = [
  "https://web-sepia-one-88.vercel.app/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3001/auth/callback",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[storage]
[storage.vector]
enabled = false
